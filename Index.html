<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <!-- Strict meta tags for viewport control, prevent zooming -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Stage Performance Library</title>
  <style>
    /* CSS Variables for Stage Mode Dark Theme */
    :root {
      --bg-color: #000000;
      --text-primary: #ffffff;
      --text-secondary: #cccccc;
      --card-bg: #1a1a1a;
      --border-color: #333333;
      --highlight: #f39c12;
      --input-bg: #222222;
      --base-font-size: 16px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: var(--base-font-size);
      /* Prevent horizontal scroll and blank padding */
      width: 100vw;
      overflow-x: hidden;
      line-height: 1.5;
    }

    /* Sticky Header */
    header {
      position: sticky;
      top: 0;
      background-color: var(--bg-color);
      padding: 1rem;
      border-bottom: 2px solid var(--border-color);
      z-index: 1000;
    }

    .controls-container {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    input, select, button {
      font-size: 1.25rem; /* Large readable fonts */
      padding: 0.75rem;
      background-color: var(--input-bg);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
      border-radius: 0.5rem;
      width: 100%;
    }
    
    input:focus, select:focus {
      outline: 2px solid var(--highlight);
    }

    /* Main Content Area */
    main {
      padding: 1rem;
    }

    #loading {
      text-align: center;
      font-size: 1.5rem;
      margin-top: 2rem;
      color: var(--text-secondary);
    }

    /* Mobile-first: 1 Column */
    .song-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
    }

    /* Desktop layout: 3 Columns when > 900px */
    @media (min-width: 900px) {
      .song-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 1.5rem;
      }
      
      .controls-container {
        flex-direction: row;
      }
      
      .controls-container > * {
        flex: 1;
      }
    }

    /* Clickable Cards */
    .song-card {
      background-color: var(--card-bg);
      border-radius: 0.5rem;
      padding: 1rem;
      cursor: pointer;
      border-left: 8px solid var(--border-color); /* Default, updated by JS */
      transition: background-color 0.2s ease;
      display: flex;
      flex-direction: column;
    }

    .song-card:active {
      background-color: #2a2a2a;
    }

    .song-title-en {
      font-size: 1.5rem;
      font-weight: bold;
      margin-bottom: 0.25rem;
    }

    .song-title-gu {
      font-size: 1.25rem;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }
    
    .song-category {
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    /* Expandable Section */
    .song-details {
      display: none; /* Hidden by default */
      margin-top: 1rem;
      border-top: 1px solid var(--border-color);
      padding-top: 1rem;
    }

    .song-card.expanded .song-details {
      display: block;
    }

    .lyrics {
      font-size: 1.5rem; /* Very large for reading on stage */
      white-space: pre-wrap; /* Preserve line breaks from sheet */
      margin-bottom: 1rem;
    }

    .btn-karaoke {
      display: inline-block;
      text-align: center;
      background-color: #c4302b; /* YouTube Red */
      color: white;
      text-decoration: none;
      font-size: 1.25rem;
      font-weight: bold;
      padding: 1rem;
      border-radius: 0.5rem;
      width: 100%;
    }
    
    .btn-karaoke:active {
      background-color: #a0201c;
    }

    /* Utility */
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

  <header>
    <div class="controls-container">
      <input type="text" id="searchInput" placeholder="Search song (English)..." aria-label="Search songs">
      <select id="categorySelect" aria-label="Filter by category">
        <option value="All">All Categories</option>
      </select>
    </div>
  </header>

  <main>
    <div id="loading">Loading songs...</div>
    <div id="songList" class="song-grid hidden"></div>
  </main>

  <script>
    let allSongs = [];
    let categoryColors = {};
    
    // 24 Vibrant color palette for Stage Mode
    const colorPalette = [
      '#ff3b30', // Red
      '#007aff', // Blue
      '#ffcc00', // Yellow
      '#34c759', // Green
      '#af52de', // Purple
      '#ff2d55', // Pink
      '#5ac8fa', // Light Blue
      '#ff9500', // Orange
      '#00c7be', // Teal
      '#e58606', // Ochre
      '#5d69b1', // Indigo
      '#52bca3', // Sea Green
      '#99c945', // Lime
      '#cc61b0', // Magenta
      '#24796c', // Dark Teal
      '#daa51b', // Gold
      '#2f8ac4', // Cerulean
      '#764e9f', // Violet
      '#ed645a', // Coral
      '#cc3a8e', // Raspberry
      '#a5aa99', // Sage
      '#8c510a', // Bronze
      '#01665e', // Emerald
      '#c51b7d'  // Fuchsia
    ];

    // Helper to get border color
    function getColor(category) {
      return categoryColors[category] || '#8e8e93';
    }

    // Initialize application
    document.addEventListener("DOMContentLoaded", () => {
      google.script.run
        .withSuccessHandler(onDataLoaded)
        .withFailureHandler(onDataError)
        .getSongData();

      // Event listeners for search and filter
      document.getElementById('searchInput').addEventListener('input', filterSongs);
      document.getElementById('categorySelect').addEventListener('change', filterSongs);
    });

    function onDataError(err) {
      document.getElementById('loading').innerText = "Error loading data. Please refresh.";
      console.error(err);
    }

    function onDataLoaded(data) {
      allSongs = data;
      
      // Populate category dropdown and map colors
      const categories = new Set();
      allSongs.forEach(song => {
        if (song.category) categories.add(song.category);
      });
      
      const select = document.getElementById('categorySelect');
      let colorIndex = 0;
      Array.from(categories).sort().forEach(cat => {
        // Assign color dynamically from palette
        categoryColors[cat] = colorPalette[colorIndex % colorPalette.length];
        colorIndex++;

        const option = document.createElement('option');
        option.value = cat;
        option.innerText = cat;
        select.appendChild(option);
      });

      // Render all songs initially
      renderSongs(allSongs);
      
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('songList').classList.remove('hidden');
    }

    function renderSongs(songsToRender) {
      const container = document.getElementById('songList');
      container.innerHTML = ''; // Clear current

      if (songsToRender.length === 0) {
        container.innerHTML = '<div style="text-align:center; padding:2rem; font-size:1.5rem;">No songs found.</div>';
        return;
      }

      songsToRender.forEach(song => {
        const card = document.createElement('div');
        card.className = 'song-card';
        card.style.borderLeftColor = getColor(song.category);

        // Header info (always visible)
        const headerDiv = document.createElement('div');
        
        const catEl = document.createElement('div');
        catEl.className = 'song-category';
        catEl.innerText = song.category;
        headerDiv.appendChild(catEl);

        const titleEn = document.createElement('div');
        titleEn.className = 'song-title-en';
        titleEn.innerText = song.englishName;
        headerDiv.appendChild(titleEn);

        if (song.gujaratiName) {
          const titleGu = document.createElement('div');
          titleGu.className = 'song-title-gu';
          titleGu.innerText = song.gujaratiName;
          headerDiv.appendChild(titleGu);
        }
        
        card.appendChild(headerDiv);

        // Details (lyrics & karaoke, hidden by default)
        const detailsDiv = document.createElement('div');
        detailsDiv.className = 'song-details';
        
        if (song.lyrics) {
          const lyricsEl = document.createElement('div');
          lyricsEl.className = 'lyrics';
          lyricsEl.innerText = song.lyrics;
          detailsDiv.appendChild(lyricsEl);
        }

        if (song.youtubeLink) {
          const btn = document.createElement('a');
          btn.className = 'btn-karaoke';
          btn.href = song.youtubeLink;
          btn.target = '_blank'; // Opens in new tab, native app on mobile
          btn.rel = 'noopener noreferrer';
          btn.innerText = 'Start Karaoke';
          btn.style.backgroundColor = getColor(song.category);
          // Stop propagation so clicking the button doesn't toggle the card
          btn.addEventListener('click', (e) => e.stopPropagation());
          detailsDiv.appendChild(btn);
        }

        card.appendChild(detailsDiv);

        // Toggle card expansion on click
        card.addEventListener('click', () => {
          card.classList.toggle('expanded');
          // Optional: Scroll card into view slightly if it expands heavily
          if (card.classList.contains('expanded')) {
             setTimeout(() => {
                 card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
             }, 50);
          }
        });

        container.appendChild(card);
      });
    }

    function filterSongs() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
      const categoryFilter = document.getElementById('categorySelect').value;

      const filtered = allSongs.filter(song => {
        const matchesSearch = song.englishName.toLowerCase().includes(searchTerm);
        const matchesCategory = categoryFilter === 'All' || song.category === categoryFilter;
        return matchesSearch && matchesCategory;
      });

      renderSongs(filtered);
    }
  </script>
</body>
</html>
